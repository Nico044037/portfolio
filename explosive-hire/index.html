<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hire AvoidMyExplosive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #050505;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* 💣 animated background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, #ff0000, transparent),
              radial-gradient(circle at 70% 70%, #ff4d4d, transparent);
  animation: moveBg 10s linear infinite;
  opacity: 0.2;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-10%, -10%); }
  100% { transform: translate(0,0); }
}

/* 💎 form */
form {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 20px;
  width: 340px;
  animation: fadeIn 1s ease forwards;
}

h2 {
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #111;
  color: white;
}

textarea {
  resize: none;
  height: 100px;
}

/* 💣 button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(90deg, #ff0000, #ff4d4d);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
}

/* success */
.success {
  text-align: center;
  margin-top: 15px;
  display: none;
}

/* error */
.error {
  text-align: center;
  margin-top: 10px;
  color: #ff4d4d;
  display: none;
}

/* animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<form id="form">
  <h2>💣 Hire AvoidMyExplosive</h2>

  <input id="name" placeholder="Your name" required>
  <input id="email" type="email" placeholder="Your email" required>
  <textarea id="message" placeholder="What do you need?" required></textarea>

  <button id="btn">Send Request</button>

  <div class="success" id="success">🚀 Request sent!</div>
  <div class="error" id="error"></div>
</form>

<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const success = document.getElementById("success");
const errorBox = document.getElementById("error");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const message = document.getElementById("message").value.trim();

  // basic validation
  if (!name || !email || !message) {
    errorBox.innerText = "Please fill all fields";
    errorBox.style.display = "block";
    return;
  }

  btn.innerText = "Sending...";
  btn.disabled = true;
  errorBox.style.display = "none";

  try {
    const res = await fetch("/api/hire-explosive", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, email, message })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      errorBox.innerText = data.error || "Failed to send";
      errorBox.style.display = "block";
      btn.innerText = "Send Request";
      btn.disabled = false;
      return;
    }

    form.reset();
    success.style.display = "block";
    btn.style.display = "none";

  } catch (err) {
    errorBox.innerText = "Connection error";
    errorBox.style.display = "block";
    btn.innerText = "Send Request";
    btn.disabled = false;
  }
});
</script>

</body>
</html>
