<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma | Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #050505;
  color: white;
  overflow-x: hidden;
}

/* 🌌 Animated gradient */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, #6d28d9, transparent),
              radial-gradient(circle at 70% 70%, #2563eb, transparent);
  animation: moveBg 10s linear infinite;
  z-index: -1;
  opacity: 0.2;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-10%, -10%); }
  100% { transform: translate(0,0); }
}

nav {
  position: fixed;
  top: 20px;
  right: 40px;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #ccc;
}

nav a:hover {
  color: white;
}

/* HERO */
header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 10%;
}

header h1 {
  font-size: 4rem;
}

header span {
  color: #8b5cf6;
}

header p {
  margin-top: 15px;
  color: #aaa;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 28px;
  border-radius: 999px;
  background: linear-gradient(90deg, #8b5cf6, #2563eb);
  color: white;
  text-decoration: none;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  width: 300px;
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

.success {
  text-align: center;
  display: none;
}

/* sections */
section {
  padding: 100px 10%;
}
</style>
</head>

<body>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
  <a class="btn" onclick="openModal()">Hire Me</a>
</nav>

<header>
  <h1>Emma <span>Dev</span></h1>
  <p>16 y/o developer from Sweden 🇸🇪</p>
  <p>Building systems, servers & web experiences.</p>

  <a class="btn" onclick="openModal()">Hire Me</a>
</header>

<section id="about">
  <h2>About</h2>
  <p>I'm Emma, a developer building systems and servers.</p>
</section>

<section id="projects">
  <h2>Projects</h2>
  <p>N5XH DUPE - Minecraft Server</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Open for projects.</p>
</section>

<footer>© 2026 Emma</footer>

<!-- 🔥 MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Hire Emma</h3>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <textarea id="message" placeholder="Message"></textarea>

    <button class="btn" onclick="sendHire()" id="sendBtn">Send</button>

    <div class="success" id="success">🚀 Sent!</div>
  </div>
</div>

<script>
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

async function sendHire() {
  const btn = document.getElementById("sendBtn");
  const success = document.getElementById("success");

  btn.innerText = "Sending...";
  btn.disabled = true;

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const res = await fetch("/api/hire-emma", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, message })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    btn.innerText = "Send";
    btn.disabled = false;
    return;
  }

  success.style.display = "block";
  btn.style.display = "none";
}
</script>

</body>
</html>
